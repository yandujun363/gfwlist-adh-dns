# 基础配置
author: "yandujun363"
distribution_url: "https://github.com/yangdujun/gfwlist-adh-dns"
output_file: "host.conf"

# 调试模式
debug: true

# GFW列表配置
gfw_list_url: "https://raw.githubusercontent.com/gfwlist/gfwlist/refs/heads/master/list.txt"
local_gfw_file: ""  # 优先使用本地文件（如果填写）
domain_output: "data/all"

# 非名单内域名解析使用的DNS（一行一个，不要有空行）
upstream_DNS: |-
  223.5.5.5
  2400:3200::1
  223.6.6.6
  2400:3200:baba::1
  119.29.29.29
  2402:4e00::
  2402:4e00:1::
  119.28.28.28

# 名单内域名解析使用的DNS（一行一个，不要有空行）
Whitelist_DNS:
  - tcp://127.0.0.2:5533
  - tls://1.1.1.1
  - tls://1dot1dot1dot1.cloudflare-dns.com
  - https://cloudflare-dns.com/dns-query
  - https://77.88.8.8/dns-query
  - https://77.88.8.1/dns-query